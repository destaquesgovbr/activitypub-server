services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: federation_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d federation_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  federation-server:
    build: .
    environment:
      NODE_TYPE: web
      DATABASE_URL: postgres://test:test@postgres:5432/federation_test
      AP_DOMAIN: federation-server:3000
      FEDERATION_AUTH_TOKEN: test-token-e2e
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  federation-worker:
    build: .
    environment:
      NODE_TYPE: worker
      DATABASE_URL: postgres://test:test@postgres:5432/federation_test
      AP_DOMAIN: federation-server:3000
    depends_on:
      postgres:
        condition: service_healthy

  gotosocial:
    image: superseriousbusiness/gotosocial:latest
    environment:
      GTS_HOST: gotosocial:8080
      GTS_DB_TYPE: sqlite
      GTS_DB_ADDRESS: /gotosocial/storage/sqlite.db
      GTS_STORAGE_LOCAL_BASE_PATH: /gotosocial/storage
      GTS_LETSENCRYPT_ENABLED: "false"
      GTS_ACCOUNTS_REGISTRATION_OPEN: "true"
    ports:
      - "8080:8080"
    volumes:
      - gotosocial-data:/gotosocial/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/nodeinfo/2.0"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  gotosocial-data:
